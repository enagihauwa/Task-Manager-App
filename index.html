<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="design-tokens.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <div class="card">

      <!-- Header -->
      <header class="card__header">
        <h1 class="card__title">Task Manager</h1>
        <div class="stats" aria-label="Task statistics">
          <div class="stats__item">
            <span class="stats__value stats__value--total" id="statTotal">0</span>
            <span class="stats__label">Total</span>
          </div>
          <div class="stats__item">
            <span class="stats__value stats__value--done" id="statDone">0</span>
            <span class="stats__label">Done</span>
          </div>
          <div class="stats__item">
            <span class="stats__value stats__value--remaining" id="statRemaining">0</span>
            <span class="stats__label">Remaining</span>
          </div>
        </div>
      </header>

      <!-- Add task form -->
      <form class="add-form" id="addForm" autocomplete="off">
        <label for="taskInput" class="visually-hidden">New task</label>
        <input
          class="add-form__input"
          id="taskInput"
          type="text"
          placeholder="Enter a new task..."
          required
        />
        <button class="add-form__btn" type="submit">Add Task</button>
      </form>

      <!-- Filter bar -->
      <div class="filter-bar" role="group" aria-label="Filter tasks">
        <div class="filter-bar__group">
          <button class="filter-bar__btn is-active" data-filter="all">All</button>
          <button class="filter-bar__btn" data-filter="active">Active</button>
          <button class="filter-bar__btn" data-filter="completed">Completed</button>
        </div>
        <button class="filter-bar__clear" id="clearCompleted">Clear Completed</button>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-state__icon">
          <svg class="empty-state__svg" viewBox="0 0 80 80" fill="none" aria-hidden="true">
            <rect x="10" y="20" width="60" height="50" rx="6" stroke="currentColor" stroke-width="3" fill="none" />
            <line x1="25" y1="35" x2="55" y2="35" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            <line x1="25" y1="45" x2="45" y2="45" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            <line x1="25" y1="55" x2="50" y2="55" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            <circle cx="60" cy="20" r="12" fill="var(--clr-primary-container)" stroke="var(--clr-primary)" stroke-width="2.5" />
            <line x1="56" y1="20" x2="64" y2="20" stroke="var(--clr-primary)" stroke-width="2.5" stroke-linecap="round" />
            <line x1="60" y1="16" x2="60" y2="24" stroke="var(--clr-primary)" stroke-width="2.5" stroke-linecap="round" />
          </svg>
        </div>
        <p class="empty-state__text" id="emptyMessage">No tasks yet. Add your first task!</p>
      </div>

      <!-- Task list -->
      <ul class="task-list" id="taskList" aria-label="Task list"></ul>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
